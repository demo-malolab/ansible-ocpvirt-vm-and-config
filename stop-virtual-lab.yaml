---
- name: stop virtual machine
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vm_name: "{{ vlab_name | lower | regex_replace('[^a-z0-9]', '-') | default('change-me') }}"
  tasks:

    - name: Ensure the VM is stopped VirtualMachine manifest
      kubernetes.core.k8s:
        host:           "{{ ocp_api_url }}"
        api_key:        "{{ ocp_token }}"
        validate_certs: "{{ ocp_validate_certs | default(false) }}"
        state:          present
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: virtual-labs
          spec:
            runStrategy: Halted
